<section class="hero-section" id="hero">
  <div class="container">
    <picture>
      <source
        media="(min-width:1280px)"
        srcset="./images/hero/desktop.jpg 1x, ./images/hero/desktop@2x.jpg 2x"
      />
      <source
        media="(min-width:768px)"
        srcset="./images/hero/tablet.jpg 1x, ./images/hero/tablet@2x.jpg 2x"
      />
      <source
        media="(max-width:767px)"
        srcset="./img/hero-mob
        .jpg 1x, ./img/hero-mob@2x.jpg 2x"
      />
      <img class="hero-img" src="./img/hero-mob.jpg" alt="girl" />
    </picture>
    <div class="hero-title-star-wrap">
      <div class="title-wrap">
        <h1 class="hero-title">
          Reviving the traditional
          <span class="accent-text">Ukrainian</span> artistry in every stitch.
        </h1>
        <a class="order-btn" href="#order"
          >Order
          <svg class="" width="26" height="26">
            <use href="./img/icons.svg#icon-arrow"></use>
          </svg>
        </a>
      </div>
      <div class="star-wrap">
        <img
          class="star-img animate__animated animate__rotateIn"
          src="./img/star.png"
          alt="star in hero"
          width="52"
        />
        <p class="hero-text">all embroidery is made by hand</p>
      </div>
    </div>
  </div>
</section>
